<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <!-- Pen body: thick diagonal pixels top-right ĺ bottom-left -->
  <rect x="13" y="0"  width="3" height="3" fill="#01FA92"/>
  <rect x="10" y="3"  width="3" height="3" fill="#01FA92"/>
  <rect x="7"  y="6"  width="3" height="3" fill="#01FA92"/>
  <rect x="4"  y="9"  width="3" height="3" fill="#01FA92"/>
  <!-- Narrow tip -->
  <rect x="2"  y="12" width="2" height="2" fill="#01FA92"/>
  <rect x="0"  y="14" width="2" height="2" fill="#01FA92"/>
  <!-- Magic sparkle pixels -->
  <rect x="17" y="3"  width="2" height="2" fill="#01FA92" opacity="0.7"/>
  <rect x="16" y="7"  width="1" height="1" fill="#01FA92" opacity="0.5"/>
  <rect x="5"  y="16" width="2" height="2" fill="#01FA92" opacity="0.5"/>
  <rect x="9"  y="17" width="1" height="1" fill="#01FA92" opacity="0.3"/>
</svg>
